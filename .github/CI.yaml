name:CI Workflow

on:
  push:
    branches:
      -main
  pull_request:
    branches:
      -main

jobs:
  test:
    runs-on:ubuntu-latest

    steps:
    -name:checkout code
      uses:actions/checkout@v4

    -name:set up Python
      uses:actions/setup-python@v3
      with:
        python-version:"3.10"

    -name:install dependencies
      run:
        python -m pip install --upgrade pip
        pip install pytest streamlit

    -name:run tests
      run:
        pytest test.py    
